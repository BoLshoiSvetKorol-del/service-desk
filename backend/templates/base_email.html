<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; padding: 0; background: #f4f6f9; font-family: Arial, sans-serif; color: #333; }
    .wrapper { max-width: 600px; margin: 32px auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .header { background: #1677ff; padding: 24px 32px; }
    .header h1 { margin: 0; color: #fff; font-size: 20px; font-weight: 600; }
    .header p { margin: 4px 0 0; color: rgba(255,255,255,.8); font-size: 13px; }
    .body { padding: 32px; }
    .footer { padding: 16px 32px; background: #f4f6f9; text-align: center; font-size: 12px; color: #888; }
    .btn { display: inline-block; margin-top: 24px; padding: 10px 24px; background: #1677ff; color: #fff !important; text-decoration: none; border-radius: 6px; font-size: 14px; }
    .ticket-number { display: inline-block; background: #e6f0ff; color: #1677ff; padding: 2px 10px; border-radius: 4px; font-family: monospace; font-size: 15px; font-weight: 700; }
    table.meta { width: 100%; border-collapse: collapse; margin-top: 16px; }
    table.meta td { padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    table.meta td:first-child { color: #888; width: 160px; }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1>Service Desk</h1>
    <p>Система управления заявками</p>
  </div>
  <div class="body">
    {% block content %}{% endblock %}
  </div>
  <div class="footer">
    Это автоматическое уведомление. Не отвечайте на это письмо.
  </div>
</div>
</body>
</html>
